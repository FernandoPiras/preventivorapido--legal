<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PreventivoRapido - Documenti Legali</title>
  <style>
    :root { --bg:#f5f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --brand:#1d4ed8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:860px; margin:40px auto; padding:0 16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; }
    h1 { margin:0 0 8px; font-size:30px; }
    p { margin:0 0 14px; color:var(--muted); }
    .links { display:grid; gap:10px; margin-top:8px; }
    a { display:block; padding:14px 16px; border:1px solid var(--line); border-radius:10px; text-decoration:none; color:var(--brand); font-weight:600; background:#fff; }
    a:hover { background:#f8fafc; }
    .foot { margin-top:16px; font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>PreventivoRapido</h1>
      <p>Documentazione legale ufficiale dell'app.</p>
      <div class="links">
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./terms.html">Termini di Utilizzo</a>
      </div>
      <div class="foot">Ultimo aggiornamento: 10 maggio 2026</div>
    </section>
  </main>
</body>
</html>
